{% extends "layouts/base.html" %}

{% block title %}
Checkout
{% endblock %}

{% block content %}

<section class="section">

    <div class="container">

        <h1>
            Ticket Checkout
        </h1>

        <form method="POST">

            <input
                type="text"
                name="name"
                placeholder="Full Name"
                required>

            <input
                type="email"
                name="email"
                placeholder="Email"
                required>

            <input
                type="text"
                name="phone"
                placeholder="Phone Number"
                required>

            <button type="submit">

                Continue

            </button>

        </form>

    </div>

</section>

{% endblock %}
